version: '3.8'

services:
  selenium-tests:
    build: .
    container_name: selenium-automation-tests
    environment:
      - DISPLAY=:99
      - CI=true
    volumes:
      - ./test-output:/app/test-output
    shm_size: 2gb  # Increase shared memory for Chrome stability
    networks:
      - selenium-network

networks:
  selenium-network:
    driver: bridge
